      <stop offset="0" stop-color="#061521"/>
      <stop offset="0.45" stop-color="#10071c"/>
      <stop offset="1" stop-color="#2a0718"/>
    </linearGradient>
    <linearGradient id="slash" x1="100" y1="420" x2="530" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7cf7ff"/>
