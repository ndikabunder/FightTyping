<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Fight Typing cover image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06101a"/><stop offset="0.4" stop-color="#12091f"/><stop offset="0.7" stop-color="#060913"/><stop offset="1" stop-color="#210718"/></linearGradient>
    <filter id="glow-cyan"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-title"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background gradient (same as MenuScene) -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Grid lines (matching MenuScene grid spacing 44px * 1.5 = 66px) -->
  <g stroke="#7cf7ff" stroke-opacity="0.08" stroke-width="1">
    <line x1="96" y1="0" x2="96" y2="1080"/><line x1="162" y1="0" x2="162" y2="1080"/>
    <line x1="228" y1="0" x2="228" y2="1080"/><line x1="294" y1="0" x2="294" y2="1080"/>
    <line x1="360" y1="0" x2="360" y2="1080"/><line x1="426" y1="0" x2="426" y2="1080"/>
    <line x1="492" y1="0" x2="492" y2="1080"/><line x1="558" y1="0" x2="558" y2="1080"/>
    <line x1="624" y1="0" x2="624" y2="1080"/><line x1="690" y1="0" x2="690" y2="1080"/>
    <line x1="756" y1="0" x2="756" y2="1080"/><line x1="822" y1="0" x2="822" y2="1080"/>
    <line x1="888" y1="0" x2="888" y2="1080"/><line x1="954" y1="0" x2="954" y2="1080"/>
    <line x1="1020" y1="0" x2="1020" y2="1080"/><line x1="1086" y1="0" x2="1086" y2="1080"/>
    <line x1="1152" y1="0" x2="1152" y2="1080"/><line x1="1218" y1="0" x2="1218" y2="1080"/>
    <line x1="1284" y1="0" x2="1284" y2="1080"/><line x1="1350" y1="0" x2="1350" y2="1080"/>
    <line x1="1416" y1="0" x2="1416" y2="1080"/><line x1="1482" y1="0" x2="1482" y2="1080"/>
    <line x1="1548" y1="0" x2="1548" y2="1080"/><line x1="1614" y1="0" x2="1614" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/><line x1="1746" y1="0" x2="1746" y2="1080"/>
    <line x1="1812" y1="0" x2="1812" y2="1080"/><line x1="1878" y1="0" x2="1878" y2="1080"/>
    <line x1="0" y1="90" x2="1920" y2="90"/><line x1="0" y1="153" x2="1920" y2="153"/>
    <line x1="0" y1="216" x2="1920" y2="216"/><line x1="0" y1="279" x2="1920" y2="279"/>
    <line x1="0" y1="342" x2="1920" y2="342"/><line x1="0" y1="405" x2="1920" y2="405"/>
    <line x1="0" y1="468" x2="1920" y2="468"/><line x1="0" y1="531" x2="1920" y2="531"/>
    <line x1="0" y1="594" x2="1920" y2="594"/><line x1="0" y1="657" x2="1920" y2="657"/>
    <line x1="0" y1="720" x2="1920" y2="720"/><line x1="0" y1="783" x2="1920" y2="783"/>
    <line x1="0" y1="846" x2="1920" y2="846"/><line x1="0" y1="909" x2="1920" y2="909"/>
    <line x1="0" y1="972" x2="1920" y2="972"/><line x1="0" y1="1035" x2="1920" y2="1035"/>
  </g>

  <!-- Player glow ellipse on ground (330*1.5=495, 520*1.5=780) -->
  <ellipse cx="495" cy="780" rx="180" ry="26" fill="#7cf7ff" opacity="0.08"/>
  <!-- Enemy glow ellipse on ground (950*1.5=1425) -->
  <ellipse cx="1425" cy="780" rx="180" ry="26" fill="#ff4d8d" opacity="0.08"/>

  <!-- Player fighter wireframe (cyan, left side) -->
  <g transform="translate(495, 700)" filter="url(#glow-cyan)" opacity="0.9">
    <!-- Aura ring -->
    <ellipse cx="0" cy="-220" rx="90" ry="90" fill="none" stroke="#42d9ff" stroke-width="2.5" opacity="0.2"/>
    <!-- Shadow -->
    <ellipse cx="0" cy="10" rx="90" ry="16" fill="#064b7a" opacity="0.3"/>
    <!-- Body -->
    <g stroke="#42d9ff" stroke-width="4" fill="none">
      <circle cx="4" cy="-310" r="30"/>
      <line x1="4" y1="-280" x2="0" y2="-180"/>
      <line x1="0" y1="-180" x2="0" y2="-100"/>
      <line x1="-40" y1="-250" x2="44" y2="-248"/>
      <line x1="-40" y1="-250" x2="-80" y2="-200"/>
      <line x1="-80" y1="-200" x2="-60" y2="-160"/>
      <line x1="44" y1="-248" x2="90" y2="-210"/>
      <line x1="90" y1="-210" x2="70" y2="-170"/>
      <line x1="0" y1="-100" x2="-40" y2="-40"/>
      <line x1="-40" y1="-40" x2="-55" y2="10"/>
      <line x1="0" y1="-100" x2="40" y2="-40"/>
      <line x1="40" y1="-40" x2="55" y2="10"/>
    </g>
    <!-- Joint dots -->
    <g fill="#7cf7ff">
      <circle cx="4" cy="-310" r="5" opacity="0.7"/>
      <circle cx="-40" cy="-250" r="4"/><circle cx="44" cy="-248" r="4"/>
      <circle cx="-80" cy="-200" r="3"/><circle cx="90" cy="-210" r="3"/>
      <circle cx="0" cy="-100" r="4"/>
    </g>
  </g>

  <!-- Enemy fighter wireframe (pink, right side, flipped) -->
  <g transform="translate(1425, 700) scale(-1,1)" filter="url(#glow-cyan)" opacity="0.86">
    <!-- Aura ring -->
    <ellipse cx="0" cy="-220" rx="90" ry="90" fill="none" stroke="#ff70c7" stroke-width="2.5" opacity="0.2"/>
    <!-- Shadow -->
    <ellipse cx="0" cy="10" rx="90" ry="16" fill="#5f1037" opacity="0.3"/>
    <!-- Body -->
    <g stroke="#ff70c7" stroke-width="4" fill="none">
      <circle cx="4" cy="-310" r="30"/>
      <line x1="4" y1="-280" x2="0" y2="-180"/>
      <line x1="0" y1="-180" x2="0" y2="-100"/>
      <line x1="-40" y1="-250" x2="44" y2="-248"/>
      <line x1="-40" y1="-250" x2="-80" y2="-200"/>
      <line x1="-80" y1="-200" x2="-60" y2="-160"/>
      <line x1="44" y1="-248" x2="90" y2="-210"/>
      <line x1="90" y1="-210" x2="70" y2="-170"/>
      <line x1="0" y1="-100" x2="-40" y2="-40"/>
      <line x1="-40" y1="-40" x2="-55" y2="10"/>
      <line x1="0" y1="-100" x2="40" y2="-40"/>
      <line x1="40" y1="-40" x2="55" y2="10"/>
    </g>
    <!-- Joint dots -->
    <g fill="#ff4d8d">
      <circle cx="4" cy="-310" r="5" opacity="0.7"/>
      <circle cx="-40" cy="-250" r="4"/><circle cx="44" cy="-248" r="4"/>
      <circle cx="-80" cy="-200" r="3"/><circle cx="90" cy="-210" r="3"/>
      <circle cx="0" cy="-100" r="4"/>
    </g>
  </g>

  <!-- Title "FIGHT TYPING" (144*1.5=216 y position, scaled font) -->
  <text x="960" y="216" text-anchor="middle" fill="#fff3b0" font-family="Trebuchet MS, Arial, sans-serif" font-size="114" font-weight="900" filter="url(#glow-title)">FIGHT TYPING</text>

  <!-- Subtitle -->
  <text x="960" y="318" text-anchor="middle" fill="#7cf7ff" font-family="Trebuchet MS, Arial, sans-serif" font-size="29" font-weight="800" filter="url(#glow-cyan)">TYPE FAST. STRIKE CLEAN.</text>

  <!-- Footer -->
  <text x="960" y="970" text-anchor="middle" fill="#e8fbff" font-family="Trebuchet MS, Arial, sans-serif" font-size="21" opacity="0.58">Keyboard duel prototype - Phaser 4</text>
</svg>
