<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#061521" />
    <title>Fight Typing</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8E2DTHLLVL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-8E2DTHLLVL');
    </script>
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loading-title">FIGHT TYPING</div>
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading...</div>
    </div>
    <style>
      #loading-screen {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #06101a; gap: 24px;
      }
      #loading-screen.hidden { display: none; }
      .loading-title {
        font: 900 48px 'Trebuchet MS', Arial; color: #fff3b0;
        text-shadow: 0 0 22px #ff4d8d, 0 0 44px #ff4d8d;
      }
      .loading-spinner {
        width: 40px; height: 40px; border: 3px solid rgba(124,247,255,0.2);
        border-top-color: #7cf7ff; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loading-text { font: 700 14px 'Trebuchet MS', Arial; color: #7cf7ff; opacity: 0.7; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <main id="app">
      <section id="game-shell" aria-label="Fight Typing game">
        <div id="game-container"></div>
        <div id="hud-root"></div>
        <input id="key-sink" aria-hidden="true" autocomplete="off" />
      </section>
      <p id="portrait-warning" hidden>Rotate device to landscape for best play.</p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
